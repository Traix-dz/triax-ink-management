<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Triax Ink Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #F1EFE8; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border: 1px solid #D3D1C7; border-radius: 14px;
                  padding: 36px 40px; width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo-title { font-size: 20px; font-weight: 600; color: #0C447C; }
    .login-logo-sub { font-size: 12px; color: #888780; margin-top: 3px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; font-weight: 500;
                  color: #888780; margin-bottom: 4px; }
    .form-control { width: 100%; padding: 9px 12px; font-size: 14px;
                    border: 1px solid #D3D1C7; border-radius: 8px;
                    color: #2C2C2A; font-family: inherit; }
    .form-control:focus { outline: none; border-color: #185FA5; }
    .btn-submit { width: 100%; padding: 10px; background: #185FA5;
                  border: none; border-radius: 8px; color: #fff;
                  font-size: 14px; font-weight: 500; cursor: pointer;
                  font-family: inherit; margin-top: 6px; }
    .btn-submit:hover { background: #0C447C; }
    .remember { display: flex; align-items: center; gap: 7px;
                font-size: 12px; color: #5F5E5A; margin-top: 10px; }
    .alert { padding: 9px 12px; border-radius: 8px; margin-bottom: 14px;
             font-size: 13px; }
    .alert-danger { background: #FCEBEB; color: #A32D2D; border: 1px solid #F09595; }
    .alert-success { background: #EAF3DE; color: #3B6D11; border: 1px solid #9ED193; }
    .alert-warning { background: #FAEEDA; color: #BA7517; border: 1px solid #FAC775; }
    .alert-info { background: #E6F1FB; color: #0C447C; border: 1px solid #85B7EB; }
    .footer-note { text-align: center; font-size: 11px; color: #B4B2A9; margin-top: 20px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-title">Triax Ink Management</div>
    <div class="login-logo-sub">Gestion de consommation d'encre flexographique</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label class="form-label">Référence client</label>
      <input type="text" name="reference" class="form-control"
             placeholder="ex. CLI-001" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" name="password" class="form-control"
             autocomplete="current-password" required>
    </div>
    <label class="remember">
      <input type="checkbox" name="remember"> Rester connecté
    </label>
    <button type="submit" class="btn-submit">Se connecter</button>
  </form>

  <div class="footer-note">Triax © {{ 2024 }} — Accès réservé aux clients</div>
</div>
</body>
</html>
