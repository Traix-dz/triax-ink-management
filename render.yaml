services:
  - type: web
    name: triax-ink-management
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python init_db.py && gunicorn wsgi:app"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FLASK_ENV
        value: production
```

👉 En bas de la page, cliquez **"Commit changes"** → **"Commit directly to main"** → **"Commit changes"**

---

## ÉTAPE 3 — Mettre à jour les variables sur Render

👉 Allez sur **dashboard.render.com**

👉 Cliquez sur votre service **`triax-ink-management`**

👉 Dans le menu gauche cliquez **"Environment"**

👉 Vérifiez que vous avez ces 4 variables — ajoutez ou corrigez ce qui manque :

| Key | Value |
|-----|-------|
| `DATABASE_URL` | l'URL Supabase copiée à l'étape 1 |
| `ANTHROPIC_API_KEY` | votre clé Anthropic |
| `SECRET_KEY` | `triax2024xK9mPqR7vN2wZ` |
| `FLASK_ENV` | `production` |

👉 Cliquez **"Save Changes"**

---

## ÉTAPE 4 — Forcer le redéploiement

👉 Dans le menu gauche cliquez **"Manual Deploy"**

👉 Cliquez **"Deploy latest commit"**

👉 Cliquez sur **"Logs"** — vous devez voir les lignes défiler. Cherchez :
```
✅ Tables créées avec succès.
```

puis :
```
Booting worker with pid...
```

Cela signifie que l'application tourne.

